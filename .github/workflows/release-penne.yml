name: Release penne

# Separate from release-pesto.yml (which builds/releases the `pesto` binary
# on `pesto-v*` tags) and release-parmesan.yml: penne is versioned and
# published independently — see crates/penne/CHANGELOG.md — so it gets its
# own tag prefix and its own GitHub Release, on its own cadence, entirely
# decoupled from pesto's and parmesan's.
#
# To ship a new penne binary release:
#   git tag penne-v<version>   # matching crates/penne/Cargo.toml
#   git push origin penne-v<version>

on:
  push:
    tags:
      - 'penne-v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: penne
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: penne
            musl: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: penne.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install musl tools
        if: matrix.musl
        run: sudo apt-get install -y musl-tools

      - name: Install Rust
        run: rustup toolchain install stable --target ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-penne-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: Build
        run: cargo build --release -p penne --bin penne --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Rename binaries
        run: |
          mv x86_64-unknown-linux-gnu/penne penne-linux-x86_64
          mv x86_64-unknown-linux-musl/penne penne-linux-x86_64-musl
          mv x86_64-pc-windows-msvc/penne.exe penne-windows-x86_64.exe

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            penne-linux-x86_64
            penne-linux-x86_64-musl
            penne-windows-x86_64.exe
          # Not `generate_release_notes: true` — see release-parmesan.yml's
          # identical note: GitHub's auto-generated notes pick the previous
          # tag by creation time across the whole repo, mixing in unrelated
          # `v*`/`parmesan-v*` tags. Point at the crate's own changelog
          # instead.
          body: |
            See [`crates/penne/CHANGELOG.md`](https://github.com/franzopl/pesto/blob/main/crates/penne/CHANGELOG.md) for what changed in this release.
