<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}sugo{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/htmx.min.js"></script>
  <script src="/static/htmx-sse.js"></script>
</head>
<body>
  <header>
    <h1>sugo</h1>
    <nav>
      <a href="/">Queue</a>
      <a href="/history">History</a>
      <a href="/settings">Settings</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <div id="toast-container"></div>
  <script>
    // The one place this app uses hand-written JS (see the plan's Design
    // Decision 2): an SSE stream of job-finished events, turned into a
    // transient toast. Everything else is server-rendered HTML swapped in
    // by htmx.
    (function () {
      var container = document.getElementById("toast-container");
      var source = new EventSource("/events/notifications");
      source.onmessage = function (event) {
        var data;
        try {
          data = JSON.parse(event.data);
        } catch (e) {
          return;
        }
        var failed = data.status === "Failed";
        var toast = document.createElement("div");
        toast.className = "toast" + (failed ? " toast-error" : "");
        toast.textContent = (failed ? "✗ " : "✓ ") + data.name + " — " + data.status;
        container.appendChild(toast);
        setTimeout(function () {
          toast.classList.add("toast-out");
          setTimeout(function () {
            toast.remove();
          }, 300);
        }, 6000);
      };
    })();
  </script>
</body>
</html>
