[package]
name = "pesto-poster"
version = "0.2.7"
edition = "2021"
rust-version = "1.89"
description = "Fast, lean Usenet poster: yEnc, NNTP and .nzb generation"
license = "MIT"
repository = "https://github.com/franzopl/pesto"
homepage = "https://github.com/franzopl/pesto"
documentation = "https://github.com/franzopl/pesto#readme"
readme = "README.md"
keywords = ["usenet", "nntp", "yenc", "nzb", "par2"]
categories = ["command-line-utilities", "network-programming"]
exclude = ["test_results/", "screenshot-*.png", "Terapia atraves da Escrita*/"]

[[bin]]
name = "pesto"
path = "src/main.rs"

[lib]
name = "pesto"
path = "src/lib.rs"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
md-5 = "0.10"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
tokio = { version = "1", features = ["rt-multi-thread", "net", "io-util", "macros", "time", "fs", "signal", "sync"] }
tokio-rustls = { version = "0.26", default-features = false, features = ["ring", "tls12", "logging"] }
webpki-roots = "0.26"
rayon = "1.12.0"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls-webpki-roots", "multipart"] }
sha2 = "0.10"
tempfile = "3"
sysinfo = { version = "0.36.1", default-features = false, features = ["system"] }

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "net", "io-util", "macros", "time"] }

[[bench]]
name = "par2_encoder"
harness = false

[profile.release]
lto = true
codegen-units = 1
panic = "abort"
strip = true
