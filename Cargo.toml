[package]
name = "pesto"
version = "0.1.0"
edition = "2021"
description = "Fast, lean Usenet poster: yEnc, NNTP and .nzb generation"
license = "MIT"

[[bin]]
name = "pesto"
path = "src/main.rs"

[lib]
name = "pesto"
path = "src/lib.rs"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
md-5 = "0.10"
serde = { version = "1", features = ["derive"] }
toml = "0.8"
tokio = { version = "1", features = ["rt-multi-thread", "net", "io-util", "macros", "time", "fs", "signal", "sync"] }
tokio-rustls = { version = "0.26", default-features = false, features = ["ring", "tls12", "logging"] }
webpki-roots = "0.26"
rayon = "1.12.0"

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "net", "io-util", "macros", "time"] }

[[bench]]
name = "par2_encoder"
harness = false

[profile.release]
lto = true
codegen-units = 1
panic = "abort"
strip = true
